<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 纪念音乐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { margin-bottom: 10px; font-weight: 300; }
        .date { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 25px; }
        audio { width: 100%; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 12px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎵 2026年4月3日 纪念</h2>
        <p class="date">一段特别的音乐</p>
        <audio controls autoplay>
            <source src="music.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放
        </audio>
        <p class="footer">NFC 实体纪念票</p>
    </div>
</body>
</html>
